<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Primex Mattress & Beddings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    primary:   { 50:'#eff6ff',100:'#dbeafe',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8' },
                    secondary: { 50:'#faf5ff',100:'#f3e8ff',500:'#a855f7',600:'#9333ea',700:'#7c3aed' },
                    accent:    { 400:'#facc15',500:'#eab308' }
                },
                fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'] }
            }}
        }
    </script>
    <style>
        .input-field:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .btn-grad { background: linear-gradient(135deg,#2563eb 0%,#7c3aed 100%); }
        .btn-grad:hover { opacity:.92; transform:translateY(-1px); }
        .strength-bar { transition: width .3s, background-color .3s; }
    </style>
</head>
<body class="font-sans bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm py-4">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
            <a href="products.html" class="flex items-center gap-2">
                <div class="w-9 h-9 bg-gradient-to-br from-primary-600 to-secondary-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-bed text-white"></i>
                </div>
                <span class="text-xl font-serif font-bold bg-gradient-to-r from-primary-700 to-secondary-700 bg-clip-text text-transparent">Primex</span>
            </a>
            <a href="my-orders.html" class="text-sm text-gray-500 hover:text-primary-600 transition-colors">
                <i class="fas fa-arrow-left mr-1"></i> My Account
            </a>
        </div>
    </nav>

    <div class="flex items-center justify-center py-16 px-4">
        <div class="w-full max-w-md">

            <!-- Card -->
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <div class="w-16 h-16 bg-primary-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-shield-alt text-primary-600 text-2xl"></i>
                </div>
                <h1 class="text-2xl font-serif font-bold text-gray-900 text-center mb-2">Change Password</h1>
                <p class="text-sm text-gray-500 text-center mb-7">Keep your account secure with a strong password.</p>

                <!-- Alert -->
                <div id="alert" class="hidden mb-5 px-4 py-3 rounded-lg text-sm font-medium"></div>

                <form id="change-form" onsubmit="handleChange(event)">
                    <!-- Current Password -->
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Current Password</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="password" name="current_password" id="pw-current" required placeholder="Your current password"
                                class="input-field w-full pl-9 pr-10 py-3 border border-gray-200 rounded-xl outline-none text-sm transition-all">
                            <button type="button" onclick="toggleField('pw-current')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-eye text-sm"></i>
                            </button>
                        </div>
                        <p class="text-xs text-gray-400 mt-1.5">
                            <a href="forgot-password.html" class="text-primary-600 hover:underline">Forgot your current password?</a>
                        </p>
                    </div>

                    <!-- New Password -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">New Password</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="password" name="new_password" id="pw-new" required placeholder="Min. 6 characters"
                                oninput="checkStrength(this.value)"
                                class="input-field w-full pl-9 pr-10 py-3 border border-gray-200 rounded-xl outline-none text-sm transition-all">
                            <button type="button" onclick="toggleField('pw-new')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-eye text-sm"></i>
                            </button>
                        </div>
                        <!-- Strength meter -->
                        <div class="mt-2 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                            <div id="strength-bar" class="strength-bar h-full rounded-full w-0 bg-red-400"></div>
                        </div>
                        <p id="strength-label" class="text-xs text-gray-400 mt-1"></p>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-7">
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Confirm New Password</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="password" name="confirm_password" id="pw-confirm" required placeholder="Repeat new password"
                                class="input-field w-full pl-9 pr-10 py-3 border border-gray-200 rounded-xl outline-none text-sm transition-all">
                            <button type="button" onclick="toggleField('pw-confirm')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-eye text-sm"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn"
                        class="btn-grad w-full py-3 text-white rounded-xl font-semibold text-sm transition-all duration-200">
                        Update Password
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <a href="my-orders.html" class="text-sm text-gray-500 hover:text-gray-700">Cancel</a>
                </div>
            </div>
        </div>
    </div>

<script src="../js/main.js"></script>
<script>
    const API = '/PRIMEX-MATRESSES/backend/api/user-auth.php';

    // Require login
    fetch(`${API}?action=check`).then(r => r.json()).then(res => {
        if (!res.success || !res.data.logged_in) {
            window.location.href = 'login.html?redirect=change-password.html';
        }
    });

    function showAlert(msg, type = 'error') {
        const el = document.getElementById('alert');
        el.className = `mb-5 px-4 py-3 rounded-lg text-sm font-medium ${type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`;
        el.textContent = msg;
        el.classList.remove('hidden');
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function toggleField(id) {
        const f = document.getElementById(id);
        f.type = f.type === 'password' ? 'text' : 'password';
    }

    function checkStrength(val) {
        const bar   = document.getElementById('strength-bar');
        const label = document.getElementById('strength-label');
        let score = 0;
        if (val.length >= 6)  score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const levels = [
            { w:'20%', color:'bg-red-400',    text:'Very weak' },
            { w:'40%', color:'bg-orange-400', text:'Weak' },
            { w:'60%', color:'bg-yellow-400', text:'Fair' },
            { w:'80%', color:'bg-blue-400',   text:'Good' },
            { w:'100%',color:'bg-green-500',  text:'Strong' },
        ];
        const lvl = levels[Math.max(0, score - 1)] || levels[0];
        bar.style.width = val ? lvl.w : '0';
        bar.className   = `strength-bar h-full rounded-full ${val ? lvl.color : ''}`;
        label.textContent = val ? lvl.text : '';
    }

    async function handleChange(e) {
        e.preventDefault();
        const btn            = document.getElementById('submit-btn');
        const currentPw      = document.getElementById('pw-current').value;
        const newPw          = document.getElementById('pw-new').value;
        const confirmPw      = document.getElementById('pw-confirm').value;

        if (newPw !== confirmPw) { showAlert('New passwords do not match'); return; }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Updating...';

        try {
            const res    = await fetch(API, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ action: 'change_password', current_password: currentPw, new_password: newPw })
            });
            const result = await res.json();
            if (result.success) {
                showAlert('Password changed successfully!', 'success');
                e.target.reset();
                document.getElementById('strength-bar').style.width = '0';
                document.getElementById('strength-label').textContent = '';
                setTimeout(() => window.location.href = 'my-orders.html', 2000);
            } else {
                showAlert(result.error || 'Failed to change password');
            }
        } catch {
            showAlert('Network error. Please try again.');
        }

        btn.disabled = false;
        btn.innerHTML = 'Update Password';
    }
</script>
</body>
</html>
