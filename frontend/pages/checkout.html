<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Primex Mattress & Beddings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
                            400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
                            800: '#1e40af', 900: '#1e3a8a',
                        },
                        secondary: {
                            50: '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff', 300: '#d8b4fe',
                            400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7c3aed',
                            800: '#6b21a8', 900: '#581c87',
                        },
                        accent: {
                            50: '#fefce8', 100: '#fef9c3', 200: '#fef08a', 300: '#fde047',
                            400: '#facc15', 500: '#eab308', 600: '#ca8a04', 700: '#a16207',
                            800: '#854d0e', 900: '#713f12',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #1d4ed8 0%, #6b21a8 100%);
            transform: translateY(-2px);
        }
        .step-active { background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); color: white; }
        .step-completed { background: #10b981; color: white; }
        .step-pending { background: #e5e7eb; color: #6b7280; }
        .form-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
    </style>
</head>
<body class="font-sans text-gray-800 bg-gray-50">
    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-white/95 backdrop-blur-md shadow-sm" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="../index.html" class="flex items-center space-x-2">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary-600 to-secondary-600 rounded-lg flex items-center justify-center">
                        <i class="fas fa-bed text-white text-lg"></i>
                    </div>
                    <span class="text-2xl font-serif font-bold bg-gradient-to-r from-primary-700 to-secondary-700 bg-clip-text text-transparent">Primex</span>
                </a>
                <div class="flex items-center space-x-4">
                    <a href="cart.html" class="p-2 text-gray-600 hover:text-primary-600 relative">
                        <i class="fas fa-shopping-cart text-xl"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Checkout Section -->
    <section class="pt-32 pb-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="text-4xl font-serif font-bold text-gray-900 mb-8">Checkout</h1>

            <!-- Progress Steps -->
            <div class="flex items-center justify-center mb-12">
                <div class="flex items-center space-x-4">
                    <div class="step-active w-10 h-10 rounded-full flex items-center justify-center font-semibold" id="step-1-indicator">1</div>
                    <span class="text-sm font-medium">Shipping</span>
                    <div class="w-16 h-1 bg-gray-200" id="step-1-line"></div>
                    <div class="step-pending w-10 h-10 rounded-full flex items-center justify-center font-semibold" id="step-2-indicator">2</div>
                    <span class="text-sm font-medium text-gray-500" id="step-2-text">Payment</span>
                    <div class="w-16 h-1 bg-gray-200" id="step-2-line"></div>
                    <div class="step-pending w-10 h-10 rounded-full flex items-center justify-center font-semibold" id="step-3-indicator">3</div>
                    <span class="text-sm font-medium text-gray-500" id="step-3-text">Confirm</span>
                </div>
            </div>

            <div class="grid lg:grid-cols-3 gap-8">
                <!-- Forms -->
                <div class="lg:col-span-2">
                    <!-- Step 1: Shipping Information -->
                    <div id="step-1" class="bg-white rounded-2xl shadow-lg p-8">
                        <h2 class="text-xl font-semibold mb-6">Shipping Information</h2>
                        <form id="shipping-form" onsubmit="goToStep(2); return false;">
                            <div class="grid md:grid-cols-2 gap-6 mb-6">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">First Name *</label>
                                    <input type="text" name="first_name" required class="form-input w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Last Name *</label>
                                    <input type="text" name="last_name" required class="form-input w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none transition-all">
                                </div>
                            </div>

                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Email Address *</label>
                                <input type="email" name="email" required class="form-input w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none transition-all">
                            </div>

                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number *</label>
                                <input type="tel" name="phone" required class="form-input w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none transition-all">
                            </div>

                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Street Address *</label>
                                <input type="text" name="address" required class="form-input w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none transition-all">
                            </div>

                            <div class="grid md:grid-cols-3 gap-6 mb-6">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">City *</label>
                                    <input type="text" name="city" required class="form-input w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">State *</label>
                                    <input type="text" name="state" required class="form-input w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">ZIP Code *</label>
                                    <input type="text" name="zip" required class="form-input w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none transition-all">
                                </div>
                            </div>

                            <div class="flex items-center mb-6">
                                <input type="checkbox" id="same-billing" checked class="w-5 h-5 text-primary-600 rounded focus:ring-primary-500">
                                <label for="same-billing" class="ml-3 text-gray-700">Billing address same as shipping</label>
                            </div>

                            <div class="flex justify-between">
                                <a href="cart.html" class="px-8 py-3 border border-gray-200 rounded-lg font-semibold text-gray-700 hover:bg-gray-50 transition-colors">
                                    <i class="fas fa-arrow-left mr-2"></i>Back to Cart
                                </a>
                                <button type="submit" class="btn-primary px-8 py-3 text-white rounded-lg font-semibold">
                                    Continue to Payment<i class="fas fa-arrow-right ml-2"></i>
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Step 2: Payment Information -->
                    <div id="step-2" class="hidden bg-white rounded-2xl shadow-lg p-8">
                        <h2 class="text-xl font-semibold mb-6">Payment Method</h2>
                        <form id="payment-form" onsubmit="goToStep(3); return false;">
                            <div class="space-y-4 mb-6">
                                <label class="flex items-center p-4 border-2 border-primary-600 rounded-lg cursor-pointer bg-primary-50">
                                    <input type="radio" name="payment_method" value="credit_card" checked class="w-5 h-5 text-primary-600">
                                    <span class="ml-3 font-medium">Credit / Debit Card</span>
                                    <div class="ml-auto flex space-x-2">
                                        <i class="fab fa-cc-visa text-2xl text-gray-400"></i>
                                        <i class="fab fa-cc-mastercard text-2xl text-gray-400"></i>
                                        <i class="fab fa-cc-amex text-2xl text-gray-400"></i>
                                    </div>
                                </label>
                                <label class="flex items-center p-4 border-2 border-gray-200 rounded-lg cursor-pointer hover:border-primary-400">
                                    <input type="radio" name="payment_method" value="paypal" class="w-5 h-5 text-primary-600">
                                    <span class="ml-3 font-medium">PayPal</span>
                                    <i class="fab fa-paypal text-2xl text-gray-400 ml-auto"></i>
                                </label>
                            </div>

                            <div id="card-fields">
                                <div class="mb-6">
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Card Number *</label>
                                    <input type="text" placeholder="1234 5678 9012 3456" class="form-input w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none transition-all">
                                </div>

                                <div class="grid md:grid-cols-2 gap-6 mb-6">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Expiry Date *</label>
                                        <input type="text" placeholder="MM/YY" class="form-input w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none transition-all">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">CVV *</label>
                                        <input type="text" placeholder="123" class="form-input w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none transition-all">
                                    </div>
                                </div>

                                <div class="mb-6">
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Name on Card *</label>
                                    <input type="text" class="form-input w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none transition-all">
                                </div>
                            </div>

                            <div class="flex justify-between">
                                <button type="button" onclick="goToStep(1)" class="px-8 py-3 border border-gray-200 rounded-lg font-semibold text-gray-700 hover:bg-gray-50 transition-colors">
                                    <i class="fas fa-arrow-left mr-2"></i>Back
                                </button>
                                <button type="submit" class="btn-primary px-8 py-3 text-white rounded-lg font-semibold">
                                    Review Order<i class="fas fa-arrow-right ml-2"></i>
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Step 3: Order Confirmation -->
                    <div id="step-3" class="hidden bg-white rounded-2xl shadow-lg p-8">
                        <h2 class="text-xl font-semibold mb-6">Review Your Order</h2>
                        
                        <div id="order-review" class="mb-8">
                            <!-- Order details loaded dynamically -->
                        </div>

                        <div class="flex justify-between">
                            <button type="button" onclick="goToStep(2)" class="px-8 py-3 border border-gray-200 rounded-lg font-semibold text-gray-700 hover:bg-gray-50 transition-colors">
                                <i class="fas fa-arrow-left mr-2"></i>Back
                            </button>
                            <button onclick="placeOrder()" class="btn-primary px-8 py-3 text-white rounded-lg font-semibold">
                                Place Order<i class="fas fa-check ml-2"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-2xl shadow-lg p-6 sticky top-24">
                        <h2 class="text-xl font-semibold mb-6">Order Summary</h2>
                        
                        <div id="order-items" class="space-y-4 mb-6 max-h-64 overflow-y-auto">
                            <!-- Items loaded dynamically -->
                        </div>

                        <div class="border-t border-gray-100 pt-4 space-y-3">
                            <div class="flex justify-between">
                                <span class="text-gray-600">Subtotal</span>
                                <span id="checkout-subtotal" class="font-medium">$0.00</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-600">Shipping</span>
                                <span id="checkout-shipping" class="font-medium">FREE</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-600">Tax (8%)</span>
                                <span id="checkout-tax" class="font-medium">$0.00</span>
                            </div>
                            <div class="border-t border-gray-100 pt-3">
                                <div class="flex justify-between">
                                    <span class="text-lg font-semibold">Total</span>
                                    <span id="checkout-total" class="text-2xl font-bold text-primary-600">$0.00</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 text-white px-6 py-4 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <div class="flex items-center space-x-3">
            <i class="fas fa-check-circle text-green-400"></i>
            <span id="toast-message">Success</span>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        let currentStep = 1;
        let cartData = null;
        let shippingData = {};
        let paymentData = {};

        // Load cart
        async function loadCart() {
            cartData = await getCart();
            if (!cartData.items || cartData.items.length === 0) {
                window.location.href = 'cart.html';
                return;
            }
            displayOrderSummary();
        }

        // Display order summary
        function displayOrderSummary() {
            const container = document.getElementById('order-items');
            container.innerHTML = cartData.items.map(item => `
                <div class="flex items-center space-x-4">
                    <img src="${item.main_image || 'https://via.placeholder.com/60'}" alt="${item.name}" class="w-16 h-16 object-cover rounded-lg">
                    <div class="flex-1">
                        <h4 class="font-medium text-sm line-clamp-1">${item.name}</h4>
                        <p class="text-gray-500 text-sm">Qty: ${item.quantity}</p>
                    </div>
                    <span class="font-semibold">$${(item.current_price * item.quantity).toFixed(2)}</span>
                </div>
            `).join('');

            document.getElementById('checkout-subtotal').textContent = `$${cartData.totals.subtotal.toFixed(2)}`;
            document.getElementById('checkout-shipping').textContent = cartData.totals.shipping === 0 ? 'FREE' : `$${cartData.totals.shipping.toFixed(2)}`;
            document.getElementById('checkout-tax').textContent = `$${cartData.totals.tax.toFixed(2)}`;
            document.getElementById('checkout-total').textContent = `$${cartData.totals.total.toFixed(2)}`;
        }

        // Go to step
        function goToStep(step) {
            if (step === 2) {
                const form = document.getElementById('shipping-form');
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }
                const formData = new FormData(form);
                shippingData = Object.fromEntries(formData);
            }

            if (step === 3) {
                const form = document.getElementById('payment-form');
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }
                const formData = new FormData(form);
                paymentData = Object.fromEntries(formData);
                displayOrderReview();
            }

            // Hide all steps
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.add('hidden');

            // Show current step
            document.getElementById(`step-${step}`).classList.remove('hidden');

            // Update indicators
            updateStepIndicators(step);
            currentStep = step;
        }

        // Update step indicators
        function updateStepIndicators(step) {
            for (let i = 1; i <= 3; i++) {
                const indicator = document.getElementById(`step-${i}-indicator`);
                const text = document.getElementById(`step-${i}-text`);
                const line = document.getElementById(`step-${i}-line`);

                indicator.classList.remove('step-active', 'step-completed', 'step-pending');
                
                if (i < step) {
                    indicator.classList.add('step-completed');
                    indicator.innerHTML = '<i class="fas fa-check"></i>';
                    if (line) line.classList.add('bg-green-500');
                } else if (i === step) {
                    indicator.classList.add('step-active');
                    indicator.textContent = i;
                    if (text) text.classList.remove('text-gray-500');
                } else {
                    indicator.classList.add('step-pending');
                    indicator.textContent = i;
                    if (text) text.classList.add('text-gray-500');
                }
            }
        }

        // Display order review
        function displayOrderReview() {
            const container = document.getElementById('order-review');
            container.innerHTML = `
                <div class="space-y-6">
                    <div class="bg-gray-50 rounded-lg p-4">
                        <h3 class="font-semibold mb-3">Shipping Address</h3>
                        <p class="text-gray-600">
                            ${shippingData.first_name} ${shippingData.last_name}<br>
                            ${shippingData.address}<br>
                            ${shippingData.city}, ${shippingData.state} ${shippingData.zip}<br>
                            ${shippingData.email}<br>
                            ${shippingData.phone}
                        </p>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4">
                        <h3 class="font-semibold mb-3">Payment Method</h3>
                        <p class="text-gray-600">
                            ${paymentData.payment_method === 'credit_card' ? 'Credit / Debit Card' : 'PayPal'}
                        </p>
                    </div>
                </div>
            `;
        }

        // Place order
        async function placeOrder() {
            try {
                const orderData = {
                    email: shippingData.email,
                    phone: shippingData.phone,
                    shipping: {
                        first_name: shippingData.first_name,
                        last_name: shippingData.last_name,
                        address: shippingData.address,
                        city: shippingData.city,
                        state: shippingData.state,
                        zip: shippingData.zip,
                        country: 'USA'
                    },
                    billing: {
                        first_name: shippingData.first_name,
                        last_name: shippingData.last_name,
                        address: shippingData.address,
                        city: shippingData.city,
                        state: shippingData.state,
                        zip: shippingData.zip,
                        country: 'USA'
                    },
                    items: cartData.items.map(item => ({
                        product_id: item.product_id,
                        name: item.name,
                        sku: item.sku,
                        quantity: item.quantity,
                        price: item.current_price
                    })),
                    subtotal: cartData.totals.subtotal,
                    shipping: cartData.totals.shipping,
                    tax: cartData.totals.tax,
                    total: cartData.totals.total,
                    payment_method: paymentData.payment_method
                };

                const response = await fetch('../backend/api/orders.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                const result = await response.json();

                if (result.success) {
                    showToast('Order placed successfully!');
                    setTimeout(() => {
                        window.location.href = `order-confirmation.html?order=${result.data.order_number}`;
                    }, 1500);
                } else {
                    showToast(result.error || 'Failed to place order', 'error');
                }
            } catch (error) {
                console.error('Error placing order:', error);
                showToast('Failed to place order', 'error');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadCart();
        });
    </script>
</body>
</html>
