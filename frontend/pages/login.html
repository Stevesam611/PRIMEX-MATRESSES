<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Primex Mattress & Beddings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    primary:   { 50:'#eff6ff',100:'#dbeafe',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8' },
                    secondary: { 50:'#faf5ff',100:'#f3e8ff',500:'#a855f7',600:'#9333ea',700:'#7c3aed' },
                    accent:    { 400:'#facc15',500:'#eab308' }
                },
                fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'] }
            }}
        }
    </script>
    <style>
        .tab-active   { border-bottom: 3px solid #2563eb; color: #2563eb; }
        .input-field  { transition: border-color 0.2s; }
        .input-field:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .btn-grad     { background: linear-gradient(135deg,#2563eb 0%,#7c3aed 100%); }
        .btn-grad:hover { opacity: .92; transform: translateY(-1px); }
    </style>
</head>
<body class="font-sans bg-gray-50 min-h-screen">

    <!-- Minimal Navbar -->
    <nav class="bg-white shadow-sm py-4">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
            <a href="products.html" class="flex items-center gap-2">
                <div class="w-9 h-9 bg-gradient-to-br from-primary-600 to-secondary-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-bed text-white"></i>
                </div>
                <span class="text-xl font-serif font-bold bg-gradient-to-r from-primary-700 to-secondary-700 bg-clip-text text-transparent">Primex</span>
            </a>
            <a href="products.html" class="text-sm text-gray-500 hover:text-primary-600 transition-colors">
                <i class="fas fa-arrow-left mr-1"></i> Back to Shop
            </a>
        </div>
    </nav>

    <div class="flex items-center justify-center py-16 px-4">
        <div class="w-full max-w-md">
            <!-- Card -->
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

                <!-- Tabs -->
                <div class="flex border-b border-gray-100">
                    <button id="tab-login" onclick="switchTab('login')"
                        class="flex-1 py-4 text-sm font-semibold text-gray-500 tab-active transition-colors">
                        Sign In
                    </button>
                    <button id="tab-register" onclick="switchTab('register')"
                        class="flex-1 py-4 text-sm font-semibold text-gray-500 transition-colors">
                        Create Account
                    </button>
                </div>

                <div class="p-8">
                    <!-- Error / Success -->
                    <div id="alert" class="hidden mb-5 px-4 py-3 rounded-lg text-sm font-medium"></div>

                    <!-- Login Form -->
                    <form id="login-form" onsubmit="handleLogin(event)">
                        <div class="mb-5">
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                            <div class="relative">
                                <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                                <input type="email" name="email" required placeholder="your@email.com"
                                    class="input-field w-full pl-9 pr-4 py-3 border border-gray-200 rounded-xl outline-none text-sm">
                            </div>
                        </div>
                        <div class="mb-6">
                            <div class="flex items-center justify-between mb-1.5">
                                <label class="block text-sm font-medium text-gray-700">Password</label>
                                <a href="forgot-password.html" class="text-xs text-primary-600 hover:underline font-medium">Forgot password?</a>
                            </div>
                            <div class="relative">
                                <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                                <input type="password" name="password" required placeholder="Your password"
                                    class="input-field w-full pl-9 pr-10 py-3 border border-gray-200 rounded-xl outline-none text-sm">
                                <button type="button" onclick="togglePw('login-form')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                    <i class="fas fa-eye text-sm"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" id="login-btn"
                            class="btn-grad w-full py-3 text-white rounded-xl font-semibold text-sm transition-all duration-200">
                            Sign In
                        </button>
                        <p class="text-center text-sm text-gray-500 mt-4">
                            Don't have an account?
                            <button type="button" onclick="switchTab('register')" class="text-primary-600 font-semibold hover:underline">Create one</button>
                        </p>
                    </form>

                    <!-- Register Form -->
                    <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">First Name</label>
                                <input type="text" name="first_name" required placeholder="John"
                                    class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Last Name</label>
                                <input type="text" name="last_name" placeholder="Doe"
                                    class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl outline-none text-sm">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                            <div class="relative">
                                <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                                <input type="email" name="email" required placeholder="your@email.com"
                                    class="input-field w-full pl-9 pr-4 py-3 border border-gray-200 rounded-xl outline-none text-sm">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Phone <span class="text-gray-400 font-normal">(optional)</span></label>
                            <div class="relative">
                                <i class="fas fa-phone absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                                <input type="tel" name="phone" placeholder="0712 345 678"
                                    class="input-field w-full pl-9 pr-4 py-3 border border-gray-200 rounded-xl outline-none text-sm">
                            </div>
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                            <div class="relative">
                                <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                                <input type="password" name="password" required placeholder="Min. 6 characters"
                                    class="input-field w-full pl-9 pr-10 py-3 border border-gray-200 rounded-xl outline-none text-sm">
                                <button type="button" onclick="togglePw('register-form')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                    <i class="fas fa-eye text-sm"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" id="register-btn"
                            class="btn-grad w-full py-3 text-white rounded-xl font-semibold text-sm transition-all duration-200">
                            Create Account
                        </button>
                        <p class="text-center text-sm text-gray-500 mt-4">
                            Already have an account?
                            <button type="button" onclick="switchTab('login')" class="text-primary-600 font-semibold hover:underline">Sign in</button>
                        </p>
                    </form>
                </div>
            </div>

            <!-- Benefits -->
            <div class="mt-6 grid grid-cols-3 gap-3 text-center">
                <div class="bg-white rounded-xl p-4 shadow-sm">
                    <i class="fas fa-box text-primary-600 text-lg mb-2"></i>
                    <p class="text-xs text-gray-500 font-medium">Track Orders</p>
                </div>
                <div class="bg-white rounded-xl p-4 shadow-sm">
                    <i class="fas fa-bolt text-primary-600 text-lg mb-2"></i>
                    <p class="text-xs text-gray-500 font-medium">Fast Checkout</p>
                </div>
                <div class="bg-white rounded-xl p-4 shadow-sm">
                    <i class="fas fa-history text-primary-600 text-lg mb-2"></i>
                    <p class="text-xs text-gray-500 font-medium">Order History</p>
                </div>
            </div>
        </div>
    </div>

<script>
    const API = '/PRIMEX-MATRESSES/backend/api/user-auth.php';

    // Check if already logged in
    fetch(`${API}?action=check`).then(r => r.json()).then(res => {
        if (res.success && res.data.logged_in) {
            const redirect = new URLSearchParams(window.location.search).get('redirect') || 'my-orders.html';
            window.location.href = redirect;
        }
    });

    // Switch to register tab if ?tab=register
    if (new URLSearchParams(window.location.search).get('tab') === 'register') {
        switchTab('register');
    }

    function switchTab(tab) {
        const loginForm    = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const tabLogin     = document.getElementById('tab-login');
        const tabRegister  = document.getElementById('tab-register');
        clearAlert();

        if (tab === 'login') {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            tabLogin.classList.add('tab-active');
            tabRegister.classList.remove('tab-active');
        } else {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            tabRegister.classList.add('tab-active');
            tabLogin.classList.remove('tab-active');
        }
    }

    function togglePw(formId) {
        const form = document.getElementById(formId);
        const pw   = form.querySelector('input[type="password"]');
        pw.type    = pw.type === 'password' ? 'text' : 'password';
    }

    function showAlert(msg, type = 'error') {
        const el = document.getElementById('alert');
        el.className = `mb-5 px-4 py-3 rounded-lg text-sm font-medium ${type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`;
        el.textContent = msg;
        el.classList.remove('hidden');
    }
    function clearAlert() { document.getElementById('alert').classList.add('hidden'); }

    async function handleLogin(e) {
        e.preventDefault();
        const btn  = document.getElementById('login-btn');
        const form = e.target;
        btn.disabled = true; btn.textContent = 'Signing in...';
        clearAlert();
        try {
            const res    = await fetch(API, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ action:'login', email: form.email.value, password: form.password.value })
            });
            const result = await res.json();
            if (result.success) {
                showAlert('Signed in! Redirecting...', 'success');
                const redirect = new URLSearchParams(window.location.search).get('redirect') || 'my-orders.html';
                setTimeout(() => window.location.href = redirect, 800);
            } else {
                showAlert(result.error || 'Login failed');
                btn.disabled = false; btn.textContent = 'Sign In';
            }
        } catch {
            showAlert('Network error. Please try again.');
            btn.disabled = false; btn.textContent = 'Sign In';
        }
    }

    async function handleRegister(e) {
        e.preventDefault();
        const btn  = document.getElementById('register-btn');
        const form = e.target;
        btn.disabled = true; btn.textContent = 'Creating account...';
        clearAlert();
        try {
            const res    = await fetch(API, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    action:     'register',
                    email:      form.email.value,
                    password:   form.password.value,
                    first_name: form.first_name.value,
                    last_name:  form.last_name.value,
                    phone:      form.phone.value,
                })
            });
            const result = await res.json();
            if (result.success) {
                showAlert('Account created! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'my-orders.html', 800);
            } else {
                showAlert(result.error || 'Registration failed');
                btn.disabled = false; btn.textContent = 'Create Account';
            }
        } catch {
            showAlert('Network error. Please try again.');
            btn.disabled = false; btn.textContent = 'Create Account';
        }
    }
</script>
</body>
</html>
