<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Primex Mattress & Beddings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    primary:   { 50:'#eff6ff',100:'#dbeafe',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8' },
                    secondary: { 50:'#faf5ff',100:'#f3e8ff',500:'#a855f7',600:'#9333ea',700:'#7c3aed' },
                },
                fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'] }
            }}
        }
    </script>
    <style>
        .input-field:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .btn-grad { background: linear-gradient(135deg,#2563eb 0%,#7c3aed 100%); }
        .btn-grad:hover { opacity:.92; transform:translateY(-1px); }
    </style>
</head>
<body class="font-sans bg-gray-50 min-h-screen">

    <!-- Minimal Navbar -->
    <nav class="bg-white shadow-sm py-4">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
            <a href="products.html" class="flex items-center gap-2">
                <div class="w-9 h-9 bg-gradient-to-br from-primary-600 to-secondary-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-bed text-white"></i>
                </div>
                <span class="text-xl font-serif font-bold bg-gradient-to-r from-primary-700 to-secondary-700 bg-clip-text text-transparent">Primex</span>
            </a>
            <a href="login.html" class="text-sm text-gray-500 hover:text-primary-600 transition-colors">
                <i class="fas fa-arrow-left mr-1"></i> Back to Sign In
            </a>
        </div>
    </nav>

    <div class="flex items-center justify-center py-16 px-4">
        <div class="w-full max-w-md">

            <!-- Card -->
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <!-- Icon -->
                <div class="w-16 h-16 bg-primary-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-key text-primary-600 text-2xl"></i>
                </div>

                <h1 class="text-2xl font-serif font-bold text-gray-900 text-center mb-2">Forgot your password?</h1>
                <p class="text-sm text-gray-500 text-center mb-7">Enter your email and we'll send you a reset link.</p>

                <!-- Alert -->
                <div id="alert" class="hidden mb-5 px-4 py-3 rounded-lg text-sm font-medium"></div>

                <!-- Form -->
                <form id="forgot-form" onsubmit="handleForgot(event)">
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input type="email" name="email" required placeholder="your@email.com"
                                class="input-field w-full pl-9 pr-4 py-3 border border-gray-200 rounded-xl outline-none text-sm transition-all">
                        </div>
                    </div>
                    <button type="submit" id="submit-btn"
                        class="btn-grad w-full py-3 text-white rounded-xl font-semibold text-sm transition-all duration-200">
                        Send Reset Link
                    </button>
                </form>

                <!-- Reset link fallback (shown when mail isn't configured) -->
                <div id="reset-link-box" class="hidden mt-6 p-4 bg-blue-50 border border-blue-200 rounded-xl">
                    <p class="text-xs font-semibold text-blue-700 mb-2"><i class="fas fa-info-circle mr-1"></i>Email not configured — use this link directly:</p>
                    <a id="reset-link-anchor" href="#" class="text-xs text-blue-700 underline break-all font-mono"></a>
                </div>

                <p class="text-center text-sm text-gray-500 mt-6">
                    Remember your password?
                    <a href="login.html" class="text-primary-600 font-semibold hover:underline">Sign in</a>
                </p>
            </div>
        </div>
    </div>

<script>
    const API = '/PRIMEX-MATRESSES/backend/api/user-auth.php';

    function showAlert(msg, type = 'error') {
        const el = document.getElementById('alert');
        el.className = `mb-5 px-4 py-3 rounded-lg text-sm font-medium ${type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}`;
        el.textContent = msg;
        el.classList.remove('hidden');
    }

    async function handleForgot(e) {
        e.preventDefault();
        const btn   = document.getElementById('submit-btn');
        const email = e.target.email.value.trim();
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Sending...';

        try {
            const res    = await fetch(API, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ action: 'forgot_password', email })
            });
            const result = await res.json();

            if (result.success) {
                showAlert(result.data.message, 'success');
                e.target.reset();

                // Show direct link if email isn't configured
                if (result.data.reset_url) {
                    const box    = document.getElementById('reset-link-box');
                    const anchor = document.getElementById('reset-link-anchor');
                    anchor.href        = result.data.reset_url;
                    anchor.textContent = result.data.reset_url;
                    box.classList.remove('hidden');
                }
            } else {
                showAlert(result.error || 'Something went wrong');
            }
        } catch {
            showAlert('Network error. Please try again.');
        }

        btn.disabled = false;
        btn.innerHTML = 'Send Reset Link';
    }
</script>
</body>
</html>
